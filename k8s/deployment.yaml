apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: gitops-app
          image: ankacy/gitops-app:f09923c00b9185bf8d6c5d17d37a9a55bc7a82a2
          ports:
            - containerPort: 3000
