apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: gitops-app
          image: ankacy/gitops-app:38e937cb2a00668f01215af9683f1004318bee3f
          ports:
            - containerPort: 3000
