apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: gitops-app
        image: ankacy/gitops-app:c01453c60bf74e21870a26ce1fe3a7c03de4b2e9
        ports:
        - containerPort: 3000